version: 1

listen:
  protocol: http3
  address: "127.0.0.1"
  port: 9889
  tls:
    cert: certs/proxy-fullchain.pem
    key: certs/proxy-key-pkcs8.pem
    client_auth:
        enabled: false
        require_client_cert: false
        ca_file: null

upstream:
  default:
    route:
      path_prefix: "/"
    backends:
      - id: "frontend1"
        address: "http://127.0.0.1:8080" # local/dev cleartext HTTP/2 backend
        # health_check is optional — omit it to disable active health checks

upstream_tls:
    verify_certificates: false
    strict_sni: false
    ca_file: certs/ca-cert.pem

performance:
  worker_threads: 1
  packet_shards_per_worker: 1
  packet_shard_queue_capacity: 2048
