version: 1

listen:
  tls:
    cert: certs/proxy-fullchain.pem
    key: certs/proxy-key-pkcs8.pem

upstream:
  default:
    route:
      path_prefix: "/"
    backends:
      - id: "backend1"
        address: "127.0.0.1:8080"  # verified HTTPS by default; use config.development.yaml for explicit local HTTP
        health_check:
          path: "/health"


performance:
  packet_shards_per_worker: 1
  packet_shard_queue_capacity: 2048

observability:
  control_api:
    enabled: true
    address: "127.0.0.1"
    port: 9890
    auth_token: "change-me"
