version: 1

listen:
    protocol: http3
    address: "0.0.0.0"
    port: 9889
    tls:
        cert: certs/proxy-fullchain.pem # default/fallback cert (used when SNI is absent or unmatched)
        key: certs/proxy-key-pkcs8.pem # default/fallback key
        certificates:                  # optional SNI certificate mappings
            - server_name: "api.example.com"
              cert: certs/api-fullchain.pem
              key: certs/api-key-pkcs8.pem
            - server_name: "www.example.com"
              cert: certs/www-fullchain.pem
              key: certs/www-key-pkcs8.pem
        client_auth:
            enabled: false              # set true to request/verify client certificates (mTLS)
            require_client_cert: false  # when true, close connections that complete handshake without a client cert
            ca_file: null               # PEM CA bundle used to verify client certificates when enabled=true

# listeners: optional multi-listener block; when set, it is the only effective listener set.
# The top-level listen block remains for backward compatibility but is ignored for runtime
# listener selection and listener validation when listeners[] is non-empty.
# Each entry is an independent listener with its own address, port, and TLS identity.
# listeners:
#   - protocol: http3
#     address: "0.0.0.0"
#     port: 9889
#     tls:
#       cert: certs/public-fullchain.pem
#       key: certs/public-key-pkcs8.pem
#   - protocol: http3
#     address: "10.0.0.1"
#     port: 9890
#     tls:
#       cert: certs/internal-fullchain.pem
#       key: certs/internal-key-pkcs8.pem

upstream_tls:
    verify_certificates: true  # safe-by-default for HTTPS upstreams
    strict_sni: true           # send backend host as SNI for HTTPS upstream connections
    ca_file: null              # optional PEM CA bundle for private PKI
    ca_dir: null               # optional directory of PEM CA bundles for private PKI

upstream:
  api_pool:
    load_balancing:
        type: "consistent-hash"

    route:
      path_prefix: "/api"

    host_policy:
      mode: pass-through   # pass-through | rewrite | upstream
      # host: "api.example.com"  # required when mode: rewrite; rejected for other modes

    forwarded_headers:
      mode: append         # append | preserve | overwrite

    # tls: optional per-upstream TLS override; inherits from upstream_tls when omitted.
    # Runtime precedence is: upstream.<name>.tls -> upstream_tls.
    # tls:
    #   verify_certificates: true
    #   strict_sni: true
    #   ca_file: certs/private-ca.pem  # optional custom CA bundle for this upstream only
    #   ca_dir: null

    backends:
      - id: "backend1"
        address: "api-backend-1.internal.example:7001"   # verified HTTPS by default; use config.development.yaml for local cleartext
        weight: 100  # relative traffic share; must be 1–1000 (higher = more traffic)
        health_check:
          path: "/health"
          interval: 5000

      - id: "backend2"
        address: "api-backend-2.internal.example:7002"   # verified HTTPS by default; use config.development.yaml for local cleartext
        weight: 50   # receives ~33% of traffic vs backend1's ~67%
        health_check:
          path: "/status"
          interval: 10000

  auth_pool:
    load_balancing:
      type: round-robin

    route:
      path_prefix: "/auth"

    backends:
      - id: "auth1"
        address: "auth-backend-1.internal.example:8001"   # verified HTTPS by default; use config.development.yaml for local cleartext
        weight: 100  # relative traffic share; must be 1–1000
        health_check:
          path: "/health"
          interval: 5000

load_balancing:
    type: "random"   # global fallback: random, consistent-hash, round-robin

log:
    level: debug
    format: plain  # plain | json
    file:
        enabled: true
        path: /var/log/spooky/spooky.log

performance:
    worker_threads: 1
    control_plane_threads: 2  # Tokio worker threads for control-plane async tasks (startup, health checks, metrics)
    packet_shards_per_worker: 1
    packet_shard_queue_capacity: 2048
    packet_shard_queue_max_bytes: 67108864    # max queued UDP datagram bytes per shard dispatch queue (64 MiB)
    reuseport: true
    pin_workers: false
    global_inflight_limit: 4096
    per_upstream_inflight_limit: 1024
    backend_timeout_ms: 2000
    backend_connect_timeout_ms: 500
    backend_body_idle_timeout_ms: 2000
    backend_body_total_timeout_ms: 30000
    backend_total_request_timeout_ms: 35000
    shutdown_drain_timeout_ms: 5000
    udp_recv_buffer_bytes: 8388608
    udp_send_buffer_bytes: 8388608
    h2_pool_max_idle_per_backend: 256
    h2_pool_idle_timeout_ms: 90000
    backend_dns_refresh_enabled: false        # periodically refresh hostname-based backend DNS in the control plane
    backend_dns_refresh_interval_ms: 30000   # refresh cadence for hostname-based backends (ms)
    per_backend_inflight_limit: 64
    new_connections_per_sec: 2000   # max new QUIC connections accepted per second (token-bucket refill rate)
    new_connections_burst: 500      # burst capacity above the steady-state rate; must be >= 1
    max_active_connections: 20000   # hard cap on active QUIC connections per worker
    quic_max_idle_timeout_ms: 5000          # close idle QUIC connections after this many ms
    quic_initial_max_data: 10000000         # connection-level flow control window (bytes)
    quic_initial_max_stream_data: 1000000   # per-stream flow control window (bytes); must be <= quic_initial_max_data
    quic_initial_max_streams_bidi: 100      # max concurrent bidirectional streams per connection
    quic_initial_max_streams_uni: 100       # max concurrent unidirectional streams per connection
    max_request_body_bytes: 1000000         # hard cap on client request body bytes per stream (413 on breach)
    max_response_body_bytes: 104857600      # hard cap on upstream response body per stream (100 MiB); streams exceeding this get a 502
    request_buffer_global_cap_bytes: 67108864         # global cap for bytes buffered in request backpressure queues (64 MiB)
    unknown_length_response_prebuffer_bytes: 2097152  # max bytes buffered for unknown-length upstream responses before emitting headers (2 MiB)
    client_body_idle_timeout_ms: 10000                # fail request streams that stop sending body bytes for this long

observability:
    metrics:
        enabled: true
        required: false          # set true to fail fast when metrics endpoint cannot start
        address: "127.0.0.1"
        port: 9901
        path: "/metrics"
        max_connections: 512
        connection_timeout_ms: 30000
    control_api:
        enabled: true
        required: false          # set true to fail fast when control API endpoint cannot start
        address: "127.0.0.1"
        port: 9902
        health_path: "/health"
        ready_path: "/ready"
        runtime_path: "/admin/runtime"
        restart_path: "/admin/runtime/restart"
        auth_token: "replace-with-strong-token"
        max_connections: 256
        connection_timeout_ms: 30000
    tracing:
        enabled: false
        service_name: "spooky"
        otlp_endpoint: null # e.g. "http://127.0.0.1:4317"
        sample_ratio: 1.0

resilience:
    adaptive_admission:
        enabled: true
        min_limit: 64
        max_limit: 4096      # optional ceiling for adaptive in-flight cap; defaults to performance.global_inflight_limit when omitted
        decrease_step: 16
        increase_step: 8
        high_latency_ms: 250
    route_queue:
        default_cap: 512
        global_cap: 2048
        shed_retry_after_seconds: 1
        caps: {}
    protocol:
        allow_0rtt: false
        early_data_safe_methods: ["GET", "HEAD"]
        max_headers_count: 128
        max_headers_bytes: 16384
        enforce_authority_host_match: true
        allowed_methods: []
        denied_path_prefixes: []
    circuit_breaker:
        enabled: true
        failure_threshold: 5
        open_ms: 10000
        half_open_max_probes: 2
    hedging:
        enabled: false
        delay_ms: 75
        safe_methods: ["GET", "HEAD"]
        route_allowlist: []
    retry_budget:
        enabled: true
        ratio_percent: 20
        per_route_ratio_percent: {}
    brownout:
        enabled: true
        trigger_inflight_percent: 90
        recover_inflight_percent: 60
        core_routes: []
    watchdog:
        enabled: false
        check_interval_ms: 1000
        poll_stall_timeout_ms: 5000
        timeout_error_rate_percent: 60
        min_requests_per_window: 20
        overload_inflight_percent: 95
        unhealthy_consecutive_windows: 3
        drain_grace_ms: 8000
        restart_cooldown_ms: 120000
        restart_command: []

security:
    privileges:
        enabled: true
        user: "nobody"
        group: "nogroup"
