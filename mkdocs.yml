site_name: Spooky
site_description: HTTP/3 edge proxy and load balancer
site_url: https://supernova-labs-org.github.io/spooky/
repo_url: https://github.com/Supernova-Labs-Org/spooky
repo_name: Supernova-Labs-Org/spooky
edit_uri: edit/master/docs/

docs_dir: docs
exclude_docs: |
  internal/

theme:
  name: shadcn
  show_title: true
  pygments_style: github-dark

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - fenced_code
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: false

plugins:
  - search

nav:
  - Home: README.md
  - Getting Started:
      - Overview: getting-started/overview.md
      - Installation: getting-started/installation.md
      - Docker: getting-started/docker.md
      - Minimum Production: getting-started/minimum-production.md
      - Quick Start: tutorials/quickstart.md
  - Concepts:
      - Overview: concepts/overview.md
      - Security Model: concepts/security-model.md
      - Basics: user-guide/basics.md
      - Architecture Overview: architecture/overview.md
      - Components: architecture/components.md
      - HTTP/3: protocols/http3.md
      - QUIC: protocols/quic.md
  - Reference:
      - Overview: reference/overview.md
      - Feature Matrix: reference/feature-matrix.md
      - Limitations: reference/limitations.md
      - Terminology: reference/terminology.md
      - Configuration Reference: configuration/reference.md
      - Configuration Examples: configuration/examples.md
      - TLS Setup: configuration/tls.md
      - API Overview: api/overview.md
      - Metrics Reference: reference/metrics-reference.md
      - Control API Reference: reference/control-api-reference.md
      - References: references.md
  - Operations:
      - Overview: operations/overview.md
      - Production Readiness: operations/production-readiness.md
      - Release Maturity: release-maturity.md
      - Production Deployment: deployment/production.md
      - Validation: deployment/validation.md
      - Migration: deployment/migration.md
      - Runbook: operations/runbook.md
      - Sizing And Capacity: operations/sizing-and-capacity.md
      - Host Tuning: operations/host-tuning.md
      - Deployment Patterns: operations/deployment-patterns.md
      - Failure Modes: operations/failure-modes.md
      - Troubleshooting: troubleshooting/common-issues.md
  - Development:
      - Overview: development/overview.md
      - Codebase Map: development/codebase-map.md
      - Testing Strategy: development/testing-strategy.md
      - Invariants: development/invariants.md
      - Adding Features Safely: development/adding-features.md
      - Benchmarking: development/benchmarking.md
      - How-To Overview: howto/README.md
      - Certificates How-To: howto/01-certificates.md
      - Configuration How-To: howto/02-configuration.md
      - Run Spooky: howto/03-run.md
      - Load Balancing Guide: user-guide/load-balancing.md
      - Changelog: changelog.md
  - Protocols:
      - HTTP/3 Deep Dive: protocols/http3.md
      - QUIC Deep Dive: protocols/quic.md
  - Roadmap: roadmap.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Supernova-Labs-Org/spooky
  version:
    provider: mike

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/code-copy.js
