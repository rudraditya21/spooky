site_name: Spooky
site_description: HTTP/3 edge proxy and load balancer
site_url: https://supernova-labs-org.github.io/spooky/
repo_url: https://github.com/Supernova-Labs-Org/spooky
repo_name: Supernova-Labs-Org/spooky
edit_uri: edit/master/docs/

docs_dir: docs
exclude_docs: |
  internal/

theme:
  name: shadcn
  show_title: true
  pygments_style: github-dark

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - fenced_code
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: false

plugins:
  - search

nav:
  - Home: README.md
  - Getting Started:
      - Overview: getting-started/overview.md
      - Installation: getting-started/installation.md
      - Docker: getting-started/docker.md
      - Quick Start: tutorials/quickstart.md
  - Configuration:
      - Reference: configuration/reference.md
      - TLS Setup: configuration/tls.md
  - How-To Guides:
      - Overview: howto/README.md
      - Certificates: howto/01-certificates.md
      - Configuration: howto/02-configuration.md
      - Run Spooky: howto/03-run.md
  - User Guide:
      - Basics: user-guide/basics.md
      - Load Balancing: user-guide/load-balancing.md
  - Architecture:
      - Overview: architecture.md
      - High-Level Design: architecture/overview.md
      - Components: architecture/components.md
  - Deployment:
      - Production: deployment/production.md
      - Troubleshooting: troubleshooting/common-issues.md
  - Development:
      - Changelog: changelog.md
  - Protocols:
      - HTTP/3: protocols/http3.md
      - QUIC: protocols/quic.md
  - API:
      - Overview: api/overview.md
  - References: references.md
  - Roadmap: roadmap.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Supernova-Labs-Org/spooky
  version:
    provider: mike

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/code-copy.js
